<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>英文法ワークシート生成（ワイド版）</title>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
        }
        .input-area {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        textarea {
            width: 100%;
            height: 120px;
            margin-bottom: 10px;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #0056b3; }

        /* ワークシート表示エリア */
        #worksheet {
            background: white;
            padding: 40px;
            min-height: 1000px;
            display: none;
        }
        .row {
            display: flex;
            align-items: flex-start;
            margin-bottom: 30px; /* 問題同士の間隔を少し広げました */
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }
        .problem {
            flex: 1; 
            font-size: 15px;
            line-height: 1.5;
            padding-right: 25px;
            word-break: break-all;
        }
        /* ★解答欄のサイズを調整しました */
        .answer-box {
            width: 600px;      /* 横幅を200px → 450pxに拡大 */
            height: 60px;      /* 高さを少しアップ */
            border: 1.5px solid #000;
            flex-shrink: 0;    /* 解答欄が潰れないように固定 */
            background-color: #fff;
        }

        @media print {
            .input-area { display: none; }
            body { background: white; padding: 0; }
            #worksheet { display: block !important; padding: 0; }
            .row { page-break-inside: avoid; } /* 途中でページが切れないように */
        }
    </style>
</head>
<body>

<div class="input-area">
    <h2>ワークシート生成 (10問)</h2>
    <textarea id="problemInput" placeholder="スプレッドシートの10行をここに貼り付け"></textarea>
    <br>
    <button onclick="generateSheet()">ワークシートを表示</button>
    <button onclick="window.print()" style="background-color: #28a745;">PDF / 印刷</button>
</div>

<div id="worksheet">
    <div style="display: flex; justify-content: space-between; align-items: baseline; border-bottom: 2px solid #333; margin-bottom: 30px; padding-bottom: 10px;">
        <h2 style="margin: 0;">English Workshop</h2>
        <div style="font-size: 18px;">Name: __________________________</div>
    </div>
    <div id="content"></div>
</div>

<script>
    function generateSheet() {
        const input = document.getElementById('problemInput').value;
        // 空行を除去して配列化
        const lines = input.split('\n').map(l => l.trim()).filter(l => l !== '');
        const contentDiv = document.getElementById('content');
        const worksheetDiv = document.getElementById('worksheet');
        
        contentDiv.innerHTML = '';
        
        lines.slice(0, 10).forEach((line, i) => {
            const row = document.createElement('div');
            row.className = 'row';
            
            // 左側：問題文
            const prob = document.createElement('div');
            prob.className = 'problem';
            // 元の文に(1)とか①が入っていてもそのまま表示（必要ならここで置換も可能）
            prob.innerHTML = `<strong>(${i + 1})</strong> ${line}`;
            
            // 右側：解答欄
            const ans = document.createElement('div');
            ans.className = 'answer-box';
            
            row.appendChild(prob);
            row.appendChild(ans);
            contentDiv.appendChild(row);
        });
        
        worksheetDiv.style.display = 'block';
    }
</script>

</body>
</html>
